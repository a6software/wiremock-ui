name: Clean Docker Package Versions

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  cleanup-package-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Remove old sha package versions
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: wiremock-ui
        run: |
          set -euo pipefail

          gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/user/packages/container/${PACKAGE_NAME}/versions?per_page=100" > versions.json

          jq -r '
            sort_by(.created_at) | reverse
            | map({
                id,
                tags: (.metadata.container.tags // [])
              })
            | map(select(
                (.tags | length) > 0 and
                (all(.tags[]; startswith("sha-")))
              ))
            | .[].id
          ' versions.json | while read -r version_id; do
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/user/packages/container/${PACKAGE_NAME}/versions/${version_id}"
          done
