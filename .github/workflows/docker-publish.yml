name: Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/a6software/wiremock-ui
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  kotlin-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Run Gradle tests
        run: ./gradlew test

  playwright-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: example/package-lock.json

      - name: Install example dependencies
        working-directory: ./example
        run: npm ci

      - name: Install Playwright browser
        working-directory: ./example
        run: npx playwright install --with-deps chromium

      - name: Run Playwright end-to-end tests
        working-directory: ./example
        run: npm run test:e2e

  docker:
    runs-on: ubuntu-latest
    needs:
      - kotlin-tests
      - playwright-tests
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=wiremock-ui
            org.opencontainers.image.description=Standalone WireMock frontend

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  cleanup-package-versions:
    runs-on: ubuntu-latest
    needs:
      - docker
    permissions:
      contents: read
      packages: write

    steps:
      - name: Remove old sha package versions
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: wiremock-ui
        run: |
          set -euo pipefail

          gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/user/packages/container/${PACKAGE_NAME}/versions?per_page=100" > versions.json

          jq -r '
            sort_by(.created_at) | reverse
            | map({
                id,
                tags: (.metadata.container.tags // [])
              })
            | map(select(
                (.tags | length) > 0 and
                (all(.tags[]; startswith("sha-")))
              ))
            | .[].id
          ' versions.json | while read -r version_id; do
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/user/packages/container/${PACKAGE_NAME}/versions/${version_id}"
          done
