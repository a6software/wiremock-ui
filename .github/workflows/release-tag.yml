name: Create Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Select which semantic version part to bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  kotlin-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Run Gradle tests
        run: ./gradlew test

  playwright-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: example/package-lock.json

      - name: Install example dependencies
        working-directory: ./example
        run: npm ci

      - name: Install Playwright browser
        working-directory: ./example
        run: npx playwright install --with-deps chromium

      - name: Run Playwright end-to-end tests
        working-directory: ./example
        run: npm run test:e2e

  calculate-version:
    runs-on: ubuntu-latest
    needs:
      - kotlin-tests
      - playwright-tests
    permissions:
      contents: read
    outputs:
      next_tag: ${{ steps.version.outputs.next_tag }}
      release_version: ${{ steps.version.outputs.release_version }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Calculate next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"

          if [[ -z "${latest_tag}" ]]; then
            major=0
            minor=0
            patch=0
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version}"
          fi

          case "${{ inputs.release_type }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              if [[ -z "${latest_tag}" ]]; then
                minor=1
                patch=0
              else
                minor=$((minor + 1))
                patch=0
              fi
              ;;
            patch)
              if [[ -z "${latest_tag}" ]]; then
                minor=1
                patch=0
              else
                patch=$((patch + 1))
              fi
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "next_tag=${next_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${next_tag#v}" >> "${GITHUB_OUTPUT}"
          echo "major=${major}" >> "${GITHUB_OUTPUT}"
          echo "minor=${minor}" >> "${GITHUB_OUTPUT}"

      - name: Publish summary
        env:
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
        run: |
          {
            echo "Prepared release ${NEXT_TAG}"
            echo "Waiting for release approval before publishing."
          } >> "${GITHUB_STEP_SUMMARY}"

  release:
    runs-on: ubuntu-latest
    needs:
      - calculate-version
    environment:
      name: release
    permissions:
      contents: write
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/a6software/wiremock-ui
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      NEXT_TAG: ${{ needs.calculate-version.outputs.next_tag }}
      RELEASE_VERSION: ${{ needs.calculate-version.outputs.release_version }}
      RELEASE_MAJOR: ${{ needs.calculate-version.outputs.major }}
      RELEASE_MINOR: ${{ needs.calculate-version.outputs.minor }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${NEXT_TAG}"
          git push origin "${NEXT_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.RELEASE_VERSION }}
            type=raw,value=${{ env.RELEASE_MAJOR }}.${{ env.RELEASE_MINOR }}
            type=raw,value=${{ env.RELEASE_MAJOR }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=wiremock-ui
            org.opencontainers.image.description=Standalone WireMock frontend
            org.opencontainers.image.version=${{ env.RELEASE_VERSION }}

      - name: Build and push release Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${NEXT_TAG}" \
            --target "${GITHUB_SHA}" \
            --title "${NEXT_TAG}" \
            --generate-notes \
            --latest

      - name: Publish summary
        env:
          NEXT_TAG: ${{ env.NEXT_TAG }}
        run: |
          {
            echo "Released ${NEXT_TAG}"
            echo "Published Docker tags ${RELEASE_VERSION}, ${RELEASE_MAJOR}.${RELEASE_MINOR}, ${RELEASE_MAJOR}, and latest."
          } >> "${GITHUB_STEP_SUMMARY}"
